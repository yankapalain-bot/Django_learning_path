{% extends 'district/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>

{% if form.errors %}
    <p>Username or password is incorrect. Please try again.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
</form>

<p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
{% endblock %}
