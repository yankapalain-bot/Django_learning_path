{% block title %}Delete Hospital{% endblock %}

{% block content %}
<h1>Delete {{ object }}?</h1>

<p>This action cannot be undone.</p>

<form method="post">

</form>

<p><a href="{% url 'hospital-list' %}">Cancel</a></p>
{% endblock %}
