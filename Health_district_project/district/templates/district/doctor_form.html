{% extends 'district/base.html' %}

{% block title %}{% if object %}Edit Doctor{% else %}Add Doctor{% endif %}{% endblock %}

{% block content %}
<h1>{% if object %}Edit {{ object }}{% else %}Add a Doctor{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>

<p><a href="{% url 'doctor-list' %}">Cancel</a></p>
{% endblock %}
